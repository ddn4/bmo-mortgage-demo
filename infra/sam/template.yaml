AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  BMO mortgage demo — the seven Temporal-free business Lambdas, the serverless
  Temporal worker Lambda, and the IAM role Temporal assumes to invoke the worker.
  Deploy to us-east-1 (co-located with the Temporal Cloud namespace, SPEC §8).

Parameters:
  FunctionPrefix:
    Type: String
    Default: bmo
    Description: Prefix for all function names (matches BMO_FN_PREFIX used by the invoker).
  TemporalExternalId:
    Type: String
    NoEcho: true
    Description: >
      Confused-deputy guard (sts:ExternalId). A value YOU choose (5-45 chars); the
      same value must be passed to `create-version --aws-lambda-assume-role-external-id`.
  TemporalAddress:
    Type: String
    Description: Temporal Cloud gRPC endpoint the worker connects to (e.g. us-east-1.aws.api.temporal.io:7233).
  TemporalNamespace:
    Type: String
    Description: Temporal Cloud namespace (e.g. ddn4-serverless-mortgage.sdvdw).
  TemporalApiKey:
    Type: String
    NoEcho: true
    Description: Temporal Cloud API key the worker uses to authenticate (encrypted at rest on the Lambda).
  WorkerMemoryMb:
    Type: Number
    Default: 512
  BuildId:
    Type: String
    Default: v1
    Description: >
      Worker build identifier. MUST match the buildId in the worker code and the
      Worker Deployment Version created in Temporal Cloud (PINNED versioning).

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    MemorySize: 256
    Timeout: 30

Resources:
  # --------------------------------------------------------------------------
  # Business Lambdas (zero Temporal dependency). They share one esbuild bundle
  # (infra/.build/business, built by `npm run build:lambdas`) but each is an
  # independent function with its own handler export and log group (SPEC §4.3).
  # --------------------------------------------------------------------------
  IntakeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${FunctionPrefix}-intake-fn'
      CodeUri: ../.build/business
      Handler: lambda.intake
  IncomeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${FunctionPrefix}-income-verification-fn'
      CodeUri: ../.build/business
      Handler: lambda.income
  CustomerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${FunctionPrefix}-customer-fn'
      CodeUri: ../.build/business
      Handler: lambda.customer
  CreditFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${FunctionPrefix}-credit-fn'
      CodeUri: ../.build/business
      Handler: lambda.credit
  RiskFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${FunctionPrefix}-risk-fn'
      CodeUri: ../.build/business
      Handler: lambda.risk
  RateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${FunctionPrefix}-rate-fn'
      CodeUri: ../.build/business
      Handler: lambda.rate
  SyndicationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${FunctionPrefix}-syndication-fn'
      CodeUri: ../.build/business
      Handler: lambda.syndication
      Timeout: 120 # long-running handoff; the activity heartbeats

  # --------------------------------------------------------------------------
  # Serverless Temporal worker. Invoked on demand by Temporal's WCI; scales to
  # zero. CodeUri (infra/.build/worker) is assembled by `npm run build:worker:lambda`
  # and MUST include the @temporalio/* node_modules with the LINUX core-bridge —
  # build with `sam build --use-container` or a layer (see infra/README.md).
  # AutoPublishAlias publishes a version each deploy -> a qualified (non-$LATEST)
  # ARN to map to the Worker Deployment Version (PINNED).
  # --------------------------------------------------------------------------
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${FunctionPrefix}-worker'
      CodeUri: ../.build/worker
      Handler: index.handler
      MemorySize: !Ref WorkerMemoryMb
      # Worker lifetime ≈ this Timeout (lambda-worker polls until ~Timeout-7s; no
      # idle shutdown). 120s lets a worker handle a burst then scale to zero ~2min
      # after the last task — vs lingering the full 15min. Raise if activities
      # ever run longer than the window (they'd otherwise be abandoned + retried).
      Timeout: 120
      AutoPublishAlias: live
      Environment:
        Variables:
          INVOKER_MODE: cloud
          # LambdaName constants (@bmo/shared) already carry the full deployed
          # name (e.g. 'bmo-intake-fn'), so the invoker must NOT add a prefix —
          # an empty value avoids a doubled 'bmo-bmo-intake-fn'. FunctionPrefix
          # below still names the deployed functions.
          BMO_FN_PREFIX: ''
          BMO_BUILD_ID: !Ref BuildId
          # @temporalio/lambda-worker reads these env vars at startup (env config).
          # Explicit env vars avoid temporal.toml ${VAR} interpolation ambiguity.
          TEMPORAL_ADDRESS: !Ref TemporalAddress
          TEMPORAL_NAMESPACE: !Ref TemporalNamespace
          TEMPORAL_API_KEY: !Ref TemporalApiKey
      Policies:
        # The worker's activities invoke the business Lambdas.
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${FunctionPrefix}-*-fn'

  # --------------------------------------------------------------------------
  # The role Temporal Cloud assumes to invoke the worker (SPEC §8). Capture the
  # RoleARN + ExternalID and register them on the Worker Deployment Version.
  # --------------------------------------------------------------------------
  TemporalInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${FunctionPrefix}-temporal-invoke-role'
      MaxSessionDuration: 3600 # 1 hour (matches Temporal's serverless-worker template)
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              # The five Temporal Cloud WCI (Worker Controller Instance) roles — one
              # per Cloud cell — that assume this role to invoke the worker Lambda.
              # Fixed, public values from the Serverless Workers docs (Cloud only).
              AWS:
                - arn:aws:iam::902542641901:role/wci-lambda-invoke
                - arn:aws:iam::160190466495:role/wci-lambda-invoke
                - arn:aws:iam::819232936619:role/wci-lambda-invoke
                - arn:aws:iam::829909441867:role/wci-lambda-invoke
                - arn:aws:iam::354116250941:role/wci-lambda-invoke
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref TemporalExternalId
      Policies:
        - PolicyName: invoke-worker
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - lambda:GetFunction
                Resource:
                  - !GetAtt WorkerFunction.Arn
                  - !Sub '${WorkerFunction.Arn}:*'

Outputs:
  WorkerAliasArn:
    Description: Qualified worker ARN (alias) to map to the Worker Deployment Version.
    Value: !Sub '${WorkerFunction.Arn}:live'
  TemporalInvokeRoleArn:
    Description: RoleARN to register on the Worker Deployment Version.
    Value: !GetAtt TemporalInvokeRole.Arn
  BusinessFunctionNames:
    Description: The seven business function names the worker invokes.
    Value: !Sub '${FunctionPrefix}-intake-fn, ${FunctionPrefix}-income-verification-fn, ${FunctionPrefix}-customer-fn, ${FunctionPrefix}-credit-fn, ${FunctionPrefix}-risk-fn, ${FunctionPrefix}-rate-fn, ${FunctionPrefix}-syndication-fn'
