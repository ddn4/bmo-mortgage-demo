# Temporal Cloud credentials for the demo-app. Create the real Secret out-of-band
# (do NOT commit the API key):
#
#   kubectl create secret generic temporal-creds \
#     --from-literal=address="<namespace-id>.<account-id>.tmprl.cloud:7233" \
#     --from-literal=namespace="<namespace-id>.<account-id>" \
#     --from-literal=apiKey="<your-temporal-cloud-api-key>"
#
# This file documents the shape only.
apiVersion: v1
kind: Secret
metadata:
  name: temporal-creds
type: Opaque
stringData:
  address: "<namespace-id>.<account-id>.tmprl.cloud:7233"
  namespace: "<namespace-id>.<account-id>"
  apiKey: "<your-temporal-cloud-api-key>"
